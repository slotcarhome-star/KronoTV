<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Minimalista</title>
    <!-- Importamos Tailwind CSS para un diseño rápido y limpio -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Transición suave para el cambio de imágenes */
        .fade-transition {
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-[#fcfcfc] text-gray-800 antialiased min-h-screen flex items-center justify-center font-sans selection:bg-gray-200">

    <main class="w-full max-w-4xl p-6 md:p-12 flex flex-col gap-8">
        
        <!-- Imagen Central -->
        <section class="w-full">
            <div class="aspect-[16/9] w-full overflow-hidden rounded-xl shadow-sm bg-gray-100">
                <img 
                    id="imagen-principal" 
                    src="im1.jpg" 
                    alt="Imagen central destacada" 
                    class="w-full h-full object-cover fade-transition"
                >
            </div>
        </section>

        <!-- Cuadrícula de 4 imágenes inferiores -->
        <!-- En móviles se muestran 2x2, en pantallas medianas/grandes 4 en línea -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 items-start">
            
            <!-- Foto 1 -->
            <div class="flex flex-col gap-2">
                <button onclick="cambiarImagen(this)" class="w-full focus:outline-none focus:ring-2 focus:ring-gray-300 rounded-lg overflow-hidden group">
                    <div class="aspect-[9/16] w-full bg-gray-100">
                        <img 
                            src="im1.jpg" 
                            data-highres="im1.jpg"
                            alt="Miniatura interior minimalista" 
                            class="w-full h-full object-cover transition duration-300 group-hover:opacity-75 group-hover:scale-105"
                        >
                    </div>
                </button>
                <p class="text-center text-xs font-medium tracking-wide text-gray-500">DEMO KRONO PERSONAL</p>
            </div>

            <!-- Foto 2 -->
            <div class="flex flex-col gap-2">
                <button onclick="cambiarImagen(this)" class="w-full focus:outline-none focus:ring-2 focus:ring-gray-300 rounded-lg overflow-hidden group">
                    <div class="aspect-[9/16] w-full bg-gray-100">
                        <img 
                            src="im2.jpg" 
                            data-highres="im2.jpg"
                            alt="Miniatura silla de diseño" 
                            class="w-full h-full object-cover transition duration-300 group-hover:opacity-75 group-hover:scale-105"
                        >
                    </div>
                </button>
                <p class="text-center text-xs font-medium tracking-wide text-gray-500">DEMO KRONO DUAL</p>
            </div>

            <!-- Foto 3 -->
            <div class="flex flex-col gap-2">
                <button onclick="cambiarImagen(this)" class="w-full focus:outline-none focus:ring-2 focus:ring-gray-300 rounded-lg overflow-hidden group">
                    <div class="aspect-[9/16] w-full bg-gray-100">
                        <img 
                            src="im3.jpg" 
                            data-highres="im3.jpg"
                            alt="Miniatura lámpara minimalista" 
                            class="w-full h-full object-cover transition duration-300 group-hover:opacity-75 group-hover:scale-105"
                        >
                    </div>
                </button>
                <p class="text-center text-xs font-medium tracking-wide text-gray-500">DEMO TRACKS TELEMETRY</p>
            </div>

            <!-- Foto 4 -->
            <div class="flex flex-col gap-2">
                <button onclick="cambiarImagen(this)" class="w-full focus:outline-none focus:ring-2 focus:ring-gray-300 rounded-lg overflow-hidden group">
                    <div class="aspect-[9/16] w-full bg-gray-100">
                        <img 
                            src="im4.jpg" 
                            data-highres="im4.jpg"
                            alt="Miniatura arquitectura" 
                            class="w-full h-full object-cover transition duration-300 group-hover:opacity-75 group-hover:scale-105"
                        >
                    </div>
                </button>
                <p class="text-center text-xs font-medium tracking-wide text-gray-500">DEMO SLOT 3D GAME</p>
            </div>

        </section>
    </main>

    <script>
        /**
         * Función para cambiar la imagen central al hacer clic en una miniatura.
         * Extrae la URL de alta resolución del atributo 'data-highres'.
         */
        function cambiarImagen(botonElemento) {
            const imagenPrincipal = document.getElementById('imagen-principal');
            const imagenMiniatura = botonElemento.querySelector('img');
            const nuevaRuta = imagenMiniatura.getAttribute('data-highres');

            // Prevenimos recargar si es la misma imagen
            if (imagenPrincipal.src === nuevaRuta) return;

            // Efecto de desvanecimiento de salida
            imagenPrincipal.style.opacity = 0;

            // Cambiamos la fuente después de que se desvanezca y volvemos a mostrarla
            setTimeout(() => {
                imagenPrincipal.src = nuevaRuta;
                imagenPrincipal.style.opacity = 1;
            }, 300); // 300ms coincide con la transición CSS
        }
    </script>
</body>
</html>
